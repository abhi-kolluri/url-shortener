version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: urlshortener-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: urlshortener
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis
    container_name: urlshortener-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: